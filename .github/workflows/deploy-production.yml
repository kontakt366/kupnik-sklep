name: Deploy → Produkcja

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kopiuj pliki na serwer
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: wp-content/
          remote_path: /tmp/kupnik-deploy/wp-content/
          remote_host: 94.130.21.96
          remote_user: root
          remote_key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Wgraj do kontenera produkcja i flush cache
        uses: appleboy/ssh-action@v1
        with:
          host: 94.130.21.96
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            set -e
            docker cp /tmp/kupnik-deploy/wp-content/themes/porto-child/. \
              wordpress:/var/www/html/wp-content/themes/porto-child/

            docker cp /tmp/kupnik-deploy/wp-content/plugins/kupnik-unimet-sync/. \
              wordpress:/var/www/html/wp-content/plugins/kupnik-unimet-sync/

            docker compose -f /opt/docker/wordpress/docker-compose.yml exec -T wordpress \
              chown -R www-data:www-data /var/www/html/wp-content/themes/porto-child \
                                          /var/www/html/wp-content/plugins/kupnik-unimet-sync

            docker compose -f /opt/docker/wordpress/docker-compose.yml exec -T wordpress \
              bash -c "test -f /usr/local/bin/wp || (curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar && chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp); wp cache flush --allow-root"

            echo "✓ Produkcja zaktualizowana"
